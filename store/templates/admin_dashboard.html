{% extends 'base.html' %}
{% block content %}

<style>
    /* Make sure the base layout doesn’t push the content */
    .dashboard-page {
        min-height: 100vh;
        background: linear-gradient(120deg, #8e2de2, #4a00e0);
        font-family: 'Poppins', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px;
        margin-top: 0; /* neutralize extra spacing */
    }

    /* Main dashboard container */
    .dashboard-wrapper {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        border-radius: 25px;
        padding: 40px 50px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        max-width: 550px;
        width: 100%;
        color: #fff;
        text-align: center;
        animation: fadeIn 0.7s ease-in-out;
        position: relative;
        z-index: 5;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .dashboard-header h2 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 10px;
        color: #fff;
    }

    .dashboard-header p {
        font-size: 15px;
        color: #e0d8ff;
        margin-bottom: 30px;
    }

    form {
        display: flex;
        flex-direction: column;
        gap: 18px;
    }

    input, textarea {
        padding: 12px 15px;
        border: none;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.9);
        color: #333;
        font-size: 15px;
        transition: 0.3s;
        width: 100%;
    }

    input:focus, textarea:focus {
        outline: none;
        box-shadow: 0 0 0 3px rgba(142, 45, 226, 0.4);
        transform: scale(1.02);
    }

    textarea {
        resize: none;
        height: 100px;
    }

    .btn-primary {
        background: linear-gradient(135deg, #c471ed, #f64f59);
        color: white;
        font-weight: 600;
        padding: 12px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        letter-spacing: 0.5px;
    }

    .btn-primary:hover {
        background: linear-gradient(135deg, #f64f59, #c471ed);
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(246, 79, 89, 0.3);
    }

    .dashboard-footer {
        margin-top: 25px;
        font-size: 13px;
        color: #ddd;
    }

    .dashboard-footer a {
        color: #ffdeff;
        text-decoration: underline;
        transition: 0.3s;
    }

    .dashboard-footer a:hover {
        color: #fff;
    }
</style>

<div class="dashboard-page">
    <div class="dashboard-wrapper">
        <div class="dashboard-header">
            <h2>🌸 Resin Art Admin Dashboard</h2>
            <p>Manage your beautiful creations effortlessly.</p>
        </div>

        <form method="post" action="{% url 'add_product' %}" enctype="multipart/form-data">
            {% csrf_token %}
            <input name="title" placeholder="Product Title" required>
            <textarea name="description" placeholder="Describe your art piece..." required></textarea>
            <input name="price" placeholder="Price (in ₹)" type="number" step="0.01" required>
            <input type="file" name="image_file" required>
            <input name="category" placeholder="Category (e.g. Coasters, Jewellery, Decor)" required>
            <button class="btn-primary">✨ Add Product</button>
        </form>

        <div class="dashboard-footer">
            <p>Want to see your collection? <a href="/products/">View Products</a></p>
        </div>
    </div>
</div>

{% endblock %}
