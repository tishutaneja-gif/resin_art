<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>

        body{
            margin:0;
            padding:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#4e73df,#1cc88a);
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card{
            width:400px;
            background:white;
            padding:40px;
            border-radius:14px;
            box-shadow:0 15px 35px rgba(0,0,0,0.25);
        }

        .login-title{
            text-align:center;
            margin-bottom:30px;
            font-weight:700;
            color:#4e73df;
        }

        .form-control{
            height:45px;
            border-radius:8px;
            margin-bottom:18px;
        }

        .btn-login{
            width:100%;
            height:45px;
            border-radius:8px;
            font-weight:600;
            background:#4e73df;
            border:none;
        }

        .btn-login:hover{
            background:#2e59d9;
        }

        .error-msg{
            text-align:center;
            margin-top:15px;
            font-size:14px;
        }

    </style>

</head>

<body>

<div class="login-card">

    <h3 class="login-title">Login to resin portal</h3>

    <form method="post">
        {% csrf_token %}

        <input type="text"
               name="username"
               class="form-control"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               class="form-control"
               placeholder="Password"
               required>

        <button class="btn btn-login text-white">
            Login
        </button>

    </form>

    {% if error %}
        <p class="text-danger error-msg">{{ error }}</p>
    {% endif %}

</div>

</body>
</html>
